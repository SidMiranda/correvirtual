<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Evento</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #ececec;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* ================= CARD ================= */

.event-card {
  width: 380px;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  overflow: visible;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
}

.event-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

.event-card:active {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

/* ================= IMAGE ================= */

.event-card__image-wrapper {
  position: relative;
  height: 200px;
  border-radius: 16px 16px 0 0;
  overflow: visible;
}

.event-card__image {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Share button */

.event-card__share {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}

/* Date badge */

.event-card__date {
  position: absolute;
  bottom: -30px;
  left: 24px;
  width: 64px;
  height: 74px;
  background: #ffffff;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 15px 30px rgba(0,0,0,0.12);
  z-index: 20;
}

.event-card__date-day {
  font-size: 20px;
  font-weight: 700;
}

.event-card__date-month {
  font-size: 13px;
  color: #666;
  font-weight: 600;
  margin-top: 2px;
}

/* ================= CONTENT ================= */

.event-card__content {
  padding: 40px 24px 20px 24px;
}

.event-card__category {
  display: inline-block;
  background: #1db954;
  color: #fff;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: 999px;
  font-weight: 600;
  margin-bottom: 14px;
}

.event-card__title {
  font-size: 20px;
  font-weight: 700;
  color: #222;
  line-height: 1.4;
  margin-bottom: 18px;
}

/* ================= FOOTER ================= */

.event-card__footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #777;
  font-size: 15px;
  border-top: 1px solid #eee;
  padding-top: 14px;
}

.event-card__location {
  display: flex;
  align-items: center;
  gap: 6px;
}

.event-card__distances {
  font-weight: 500;
  color: #555;
}

</style>
</head>
<body>

<div class="event-card">

  <div class="event-card__image-wrapper">
    <img 
      class="event-card__image" 
      src="https://picsum.photos/800/500?random=12" 
      alt="Imagem do evento">

    <div class="event-card__share">🔗</div>

    <div class="event-card__date">
      <span class="event-card__date-day">01</span>
      <span class="event-card__date-month">FEV</span>
    </div>
  </div>

  <div class="event-card__content">

    <span class="event-card__category">
      Corrida de Rua
    </span>

    <h2 class="event-card__title">
      Circuito do Sol - Rio de Janeiro - 2026
    </h2>

    <div class="event-card__footer">
      <div class="event-card__location">
        📍 <span>São Paulo, SP</span>
      </div>
      <div class="event-card__distances">
        5k 10k 15k
      </div>
    </div>

  </div>

</div>

</body>
</html>
