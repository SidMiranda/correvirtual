name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            # Cria ou recria o .env no servidor com os dados do GitHub Secrets
            cat << 'EOF' > /home/correvirtual/.env
            ${{ secrets.PRODUCTION_ENV }}
            EOF
            cd /home
            ./deploy.sh