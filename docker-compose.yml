services:
  mysql:
    image: mysql:8.0
    container_name: corre_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: corre_virtual
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: corre_user
      MYSQL_PASSWORD: corre_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: corre_app
    volumes:
      - ./src:/var/www
      - laravel_storage:/var/www/storage
    depends_on:
      - mysql


  nginx:
    image: nginx:stable-alpine
    container_name: corre_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  mysql_data:
  laravel_storage: