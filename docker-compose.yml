services:
  mysql:
    image: mysql:8.0
    container_name: corre_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: corre_virtual
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: corre_user
      MYSQL_PASSWORD: corre_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: corre_app
    volumes:
      - ./src:/var/www
      - laravel_storage:/var/www/storage
    depends_on:
      - mysql


  nginx:
    image: nginx:stable-alpine
    container_name: corre_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: corre_phpmyadmin
    restart: unless-stopped
    environment:
      # ESSA É A PARTE MAIS IMPORTANTE:
      # Diz ao phpMyAdmin qual é a máquina do banco de dados.
      # O valor DEVE ser exatamente o nome do seu serviço de banco acima (que é 'mysql').
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"  # Vamos acessar o phpMyAdmin na porta 8080 do seu PC
    depends_on:
      - mysql

volumes:
  mysql_data:
  laravel_storage: